<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kembara Nabi Yusuf A.S.</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background: #000; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: gold; display: flex;
            align-items: center; justify-content: center; z-index: 100;
            flex-direction: column;
        }
        .menu-container h1 {
            font-size: 3.8rem; text-shadow: 0 0 30px gold; margin-bottom: 50px;
        }
        button {
            margin: 12px; padding: 15px 50px; font-size: 1.6rem;
            background: #3c2008; color: gold; border: 3px solid gold;
            border-radius: 12px; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: gold; color: #3c2008; transform: scale(1.08); }
        
        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #2c1a0f; padding: 30px; border: 4px solid gold;
            z-index: 200; color: gold; text-align: center;
        }
        .rewind-text {
            font-size: 3rem; margin-top: 100px; opacity: 0; transition: 2s;
        }
    </style>
</head>
<body>
    <!-- MAIN MENU -->
    <div id="start-overlay" class="overlay">
        <div class="menu-container">
            <h1>KEMBARA<br>NABI YUSUF A.S.</h1>
            <button onclick="startGame()">▶ MAIN</button>
            <button onclick="toggleSettings()">⚙ SETTING</button>
            <button onclick="showNotes()">📖 NOTA</button>
            <button onclick="exitGame()">❌ KELUAR</button>
        </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings-modal" class="modal" style="display:none">
        <h2>Setting</h2>
        <p>Volume: <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="updateAudioVolume()"></p>
        <p>Sensitivity: <input type="range" id="sens-slider" min="0.2" max="2" step="0.1" value="1" oninput="updateSensitivity()"></p>
        <button onclick="toggleSettings()">Tutup</button>
    </div>

    <!-- REWIND ANIMATION -->
    <div id="rewind-screen" class="overlay" style="display:none; background:#111;">
        <div id="rewind-text" class="rewind-text"></div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // ================== VARIABLE GLOBAL ==================
        let scene, camera, renderer, prevTime = performance.now();
        let velocity = new THREE.Vector3();
        let isGrounded = false;
        let sensitivity = 1;
        let currentLevelIndex = 0;
        let interactableObjects = [];

        const levels = [
            { offset: { x: 0, z: 0 } }
        ];

        // ================== THREE.JS INIT ==================
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x88aaff, 30, 80);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffddaa, 1.2);
            sun.position.set(20, 40, 10);
            scene.add(sun);

            // Ground
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0xc2a56b });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            window.addEventListener('resize', onWindowResize);
        }

        // ================== REWIND ANIMATION ==================
        function startRewindAnimation() {
            const rewindScreen = document.getElementById('rewind-screen');
            const text = document.getElementById('rewind-text');
            
            rewindScreen.style.display = 'flex';
            rewindScreen.style.opacity = '1';

            // Sequence
            setTimeout(() => {
                text.textContent = "4000 Tahun Dahulu...";
                text.style.opacity = "1";
            }, 800);

            setTimeout(() => {
                rewindScreen.style.opacity = "0";
                setTimeout(() => {
                    rewindScreen.style.display = 'none';
                    document.getElementById('start-overlay').style.display = 'none';
                    startActualGame();
                }, 1200);
            }, 4200);
        }

        function startActualGame() {
            const bgAudio = document.getElementById('bg-music');
            if (bgAudio) bgAudio.play().catch(() => {});
            animate();
        }

        // ================== GAME LOOP ==================
        function updatePlayerPhysics(delta) {
            // Contoh physics asas (boleh tambah kod asal awak di sini)
            velocity.y -= 9.8 * delta;
            camera.position.y += velocity.y * delta;

            if (camera.position.y <= 1.7) {
                velocity.y = 0;
                camera.position.y = 1.7;
                isGrounded = true;
            }

            const curLvl = levels[currentLevelIndex];
            camera.position.x = Math.max(curLvl.offset.x - 28, Math.min(curLvl.offset.x + 28, camera.position.x));
            camera.position.z = Math.max(curLvl.offset.z - 28, Math.min(curLvl.offset.z + 28, camera.position.z));
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1);
            prevTime = time;

            updatePlayerPhysics(delta);
            renderer.render(scene, camera);
        }

        // ================== UI FUNCTIONS ==================
        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            startRewindAnimation();
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
        }

        function updateAudioVolume() {
            const bg = document.getElementById('bg-music');
            if (bg) bg.volume = parseFloat(document.getElementById('volume-slider').value);
        }

        function updateSensitivity() {
            sensitivity = parseFloat(document.getElementById('sens-slider').value);
        }

        function showNotes() {
            alert("📖 NOTA PERMAINAN\n\n- Cerita berdasarkan Surah Yusuf\n- Cari bintang dan item untuk maju\n- Elakkan saudara-saudara yang iri hati");
        }

        function exitGame() {
            if (confirm("Keluar dari permainan?")) window.close();
        }

        function onWindowResize() {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ================== START ==================
        window.onload = () => {
            init();
        };
    </script>
</body>
</html>
